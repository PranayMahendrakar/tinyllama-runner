<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>TinyLlama Chat</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px 16px 24px}
    h1{margin:22px 0 4px;font-size:1.75rem;color:#58a6ff;display:flex;align-items:center;gap:8px}
    .sub{color:#8b949e;font-size:.84rem;margin-bottom:14px;text-align:center}
    #chat-box{width:100%;max-width:760px;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;height:60vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
    .msg{max-width:83%;padding:10px 14px;border-radius:11px;line-height:1.55;font-size:.93rem;word-wrap:break-word;white-space:pre-wrap}
    .lbl{font-size:.65rem;font-weight:700;letter-spacing:.7px;text-transform:uppercase;opacity:.45;margin-bottom:3px}
    .user{align-self:flex-end;background:#1f6feb;color:#fff;border-bottom-right-radius:2px}
    .bot{align-self:flex-start;background:#21262d;border:1px solid #30363d;border-bottom-left-radius:2px}
    .thinking{align-self:flex-start;background:#0d1117;border:1px dashed #388bfd55;color:#388bfd;font-style:italic;animation:blink 1.3s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
    #row{display:flex;gap:9px;width:100%;max-width:760px;margin-top:11px}
    #inp{flex:1;padding:12px 15px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#c9d1d9;font-size:.93rem;outline:none;resize:none;line-height:1.4;font-family:inherit}
    #inp:focus{border-color:#388bfd}
    #btn{padding:0 22px;background:#238636;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:600;transition:background .15s;white-space:nowrap}
    #btn:hover{background:#2ea043}
    #btn:disabled{background:#21262d;color:#484f58;cursor:not-allowed;border:1px solid #30363d}
    .status{width:100%;max-width:760px;margin-top:6px;font-size:.76rem;color:#8b949e;min-height:16px}
    .links{margin-top:10px;font-size:.73rem;color:#484f58;text-align:center;line-height:1.8}
    .links a{color:#388bfd;text-decoration:none}
    .links a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <h1>&#129302; TinyLlama Chat</h1>
  <div class="sub">Runs entirely on GitHub Actions &mdash; no local setup, no servers</div>
  <div id="chat-box">
    <div class="msg bot"><div class="lbl">TinyLlama</div>Hi! Ask me anything. I run on GitHub Actions &mdash; your message triggers a run and I reply in about 2&ndash;3 minutes.</div>
  </div>
  <div id="row">
    <textarea id="inp" rows="1" placeholder="Ask TinyLlama anything..."></textarea>
    <button id="btn">Send</button>
  </div>
  <div class="status" id="status"></div>
  <div class="links">
    No local setup needed &bull; Free GitHub Actions compute &bull;
    <a href="https://github.com/PranayMahendrakar/tinyllama-runner/actions" target="_blank">View runs</a> &bull;
    <a href="https://github.com/PranayMahendrakar/tinyllama-runner" target="_blank">Source code</a>
  </div>

  <script>
    var OWNER  = "PranayMahendrakar";
    var REPO   = "tinyllama-runner";
    var TOKEN  = "__CHAT_TOKEN__";
    var RAW    = "https://raw.githubusercontent.com/" + OWNER + "/" + REPO + "/main/answers/";
    var GH_API = "https://api.github.com";

    function setStatus(t){ document.getElementById("status").textContent = t; }

    function addMsg(text, cls){
      var box = document.getElementById("chat-box");
      var d = document.createElement("div");
      d.className = "msg " + cls;
      var lbl = document.createElement("div");
      lbl.className = "lbl";
      lbl.textContent = cls==="user" ? "You" : (cls==="thinking" ? "Thinking..." : "TinyLlama");
      d.appendChild(lbl);
      var s = document.createElement("span");
      s.textContent = text;
      d.appendChild(s);
      box.appendChild(d);
      box.scrollTop = box.scrollHeight;
      return d;
    }

    function removeEl(el){ if(el&&el.parentNode) el.parentNode.removeChild(el); }
    function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }
    function genId(){ return Date.now().toString(36)+Math.random().toString(36).substr(2,6); }

    async function triggerWorkflow(q, msgId){
      var res = await fetch(GH_API+"/repos/"+OWNER+"/"+REPO+"/actions/workflows/chat.yml/dispatches",{
        method:"POST",
        headers:{
          "Authorization":"Bearer "+TOKEN,
          "Accept":"application/vnd.github+json",
          "Content-Type":"application/json"
        },
        body:JSON.stringify({ref:"main",inputs:{question:q,msg_id:msgId}})
      });
      return res.status === 204;
    }

    async function pollAnswer(msgId){
      var deadline = Date.now() + 360000;
      var attempt = 0;
      while(Date.now() < deadline){
        attempt++;
        await sleep(7000);
        try{
          var r = await fetch(RAW+msgId+".json?nc="+attempt,{cache:"no-store"});
          if(r.ok){
            var d = await r.json();
            if(d && d.status==="done" && d.answer) return d.answer;
          }
        } catch(e){}
        setStatus("Waiting for TinyLlama... ("+attempt+" checks) ~2-3 min total");
      }
      return null;
    }

    async function sendMessage(){
      var inp = document.getElementById("inp");
      var btn = document.getElementById("btn");
      var q = inp.value.trim();
      if(!q || btn.disabled) return;

      inp.value = "";
      btn.disabled = true;
      addMsg(q, "user");
      var thinkEl = addMsg("Triggering GitHub Actions run...", "thinking");
      setStatus("Sending to GitHub Actions...");

      var msgId = genId();
      var ok = false;
      try { ok = await triggerWorkflow(q, msgId); } catch(e){}

      if(!ok){
        removeEl(thinkEl);
        addMsg("Could not trigger workflow. The CHAT_TOKEN may have expired. Contact the repo owner.", "bot");
        btn.disabled = false;
        setStatus("");
        return;
      }

      setStatus("Workflow triggered! TinyLlama is loading the model (cached after first run)...");
      var answer = await pollAnswer(msgId);
      removeEl(thinkEl);

      if(answer){
        addMsg(answer, "bot");
        setStatus("Done.");
      } else {
        addMsg("Timed out (6 min). Check: github.com/"+OWNER+"/"+REPO+"/actions", "bot");
        setStatus("Timed out.");
      }
      btn.disabled = false;
    }

    document.getElementById("btn").addEventListener("click", sendMessage);
    document.getElementById("inp").addEventListener("keydown", function(e){
      if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
