name: Fast Chat API

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'User question'
        required: true
        default: 'Who are you?'
      msg_id:
        description: 'Unique message ID'
        required: true
        default: 'default'

permissions:
  contents: write

jobs:
  chat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-qwen-fast-v1
          restore-keys: pip-qwen-fast-v1

      - name: Cache model
        uses: actions/cache@v3
        id: model-cache
        with:
          path: ./model
          key: qwen2.5-0.5b-instruct-v1

      - name: Install dependencies
        run: |
          pip install -q torch --index-url https://download.pytorch.org/whl/cpu
          pip install -q transformers accelerate

      - name: Run inference
        run: |
          python - <<'PYEOF'
          from transformers import AutoModelForCausalLM, AutoTokenizer
          import torch, os, json

          question = os.environ.get("USER_QUESTION", "Who are you?")
          msg_id = os.environ.get("MSG_ID", "default")
          print(f"Q: {question}")

          model_name = "Qwen/Qwen2.5-0.5B-Instruct"
          cache_dir = "./model"

          tokenizer = AutoTokenizer.from_pretrained(model_name, cache_dir=cache_dir)
          model = AutoModelForCausalLM.from_pretrained(
              model_name,
              cache_dir=cache_dir,
              torch_dtype=torch.float16,
              low_cpu_mem_usage=True,
          )
          model.eval()
          print("Model ready.")

          messages = [
              {"role": "system", "content": "You are a helpful AI assistant. Be concise."},
              {"role": "user", "content": question}
          ]
          text = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
          encoded = tokenizer([text], return_tensors="pt")
          input_len = encoded["input_ids"].shape[1]

          with torch.no_grad():
              out = model.generate(
                  **encoded,
                  max_new_tokens=150,
                  do_sample=False,
                  pad_token_id=tokenizer.eos_token_id,
              )

          response = tokenizer.decode(out[0][input_len:], skip_special_tokens=True).strip()
          print(f"Answer: {response}")

          os.makedirs("answers", exist_ok=True)
          with open(f"answers/{msg_id}.json", "w") as f:
              json.dump({"msg_id": msg_id, "question": question, "answer": response, "status": "done"}, f)
          print("=== Done ===")
          PYEOF
        env:
          USER_QUESTION: ${{ github.event.inputs.question }}
          MSG_ID: ${{ github.event.inputs.msg_id }}

      - name: Commit answer
        run: |
          git config user.name "ChatBot"
          git config user.email "bot@github.com"
          git add answers/
          git commit -m "ans[${{ github.event.inputs.msg_id }}]" || echo "Nothing to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
