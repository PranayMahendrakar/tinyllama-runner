name: Fast Chat API

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'User question'
        required: true
        default: 'Who are you?'
      msg_id:
        description: 'Unique message ID'
        required: true
        default: 'default'

permissions:
  contents: write

jobs:
  chat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-llama-cpp-v2
          restore-keys: pip-llama-cpp-v2

      - name: Cache GGUF model
        uses: actions/cache@v3
        id: model-cache
        with:
          path: ./model
          key: qwen2.5-0.5b-gguf-q4km-v1

      - name: Install dependencies
        run: |
          pip install -q llama-cpp-python huggingface_hub

      - name: Download model (if not cached)
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          python - <<'PYEOF'
          from huggingface_hub import hf_hub_download
          import os
          os.makedirs("./model", exist_ok=True)
          path = hf_hub_download(
              repo_id="Qwen/Qwen2.5-0.5B-Instruct-GGUF",
              filename="qwen2.5-0.5b-instruct-q4_k_m.gguf",
              local_dir="./model"
          )
          print(f"Downloaded to: {path}")
          PYEOF

      - name: Run inference
        run: |
          python - <<'PYEOF'
          from llama_cpp import Llama
          import os, json

          question = os.environ.get("USER_QUESTION", "Who are you?")
          msg_id = os.environ.get("MSG_ID", "default")
          print(f"Q: {question}")

          model_path = "./model/qwen2.5-0.5b-instruct-q4_k_m.gguf"
          llm = Llama(
              model_path=model_path,
              n_ctx=512,
              n_threads=4,
              verbose=False
          )

          messages = [
              {"role": "system", "content": "You are a helpful AI. Be concise."},
              {"role": "user", "content": question}
          ]

          output = llm.create_chat_completion(
              messages=messages,
              max_tokens=100,
              temperature=0.0,
          )

          response = output["choices"][0]["message"]["content"].strip()
          print(f"Answer: {response}")

          os.makedirs("answers", exist_ok=True)
          with open(f"answers/{msg_id}.json", "w") as f:
              json.dump({"msg_id": msg_id, "question": question, "answer": response, "status": "done"}, f)
          print("=== Done ===")
          PYEOF
        env:
          USER_QUESTION: ${{ github.event.inputs.question }}
          MSG_ID: ${{ github.event.inputs.msg_id }}

      - name: Commit answer
        run: |
          git config user.name "ChatBot"
          git config user.email "bot@github.com"
          git add answers/
          git commit -m "ans[${{ github.event.inputs.msg_id }}]" || echo "Nothing to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
