name: TinyLlama Chat API

on:
  workflow_dispatch:
      inputs:
            question:
                    description: 'User question for TinyLlama'
                            required: true
                                    default: 'Who are you?'

                                    jobs:
                                      chat:
                                          runs-on: ubuntu-latest

                                              steps:
                                                    - name: Checkout repository
                                                            uses: actions/checkout@v3

                                                                  - name: Set up Python
                                                                          uses: actions/setup-python@v4
                                                                                  with:
                                                                                            python-version: '3.10'

                                                                                                  - name: Install dependencies
                                                                                                          run: |
                                                                                                                    python -m pip install --upgrade pip
                                                                                                                              pip install -r requirements.txt
                                                                                                                              
                                                                                                                                    - name: Run TinyLlama with question
                                                                                                                                            run: |
                                                                                                                                                      python - <<'PYEOF'
                                                                                                                                                                from transformers import AutoModelForCausalLM, AutoTokenizer
                                                                                                                                                                          import torch, sys, os
                                                                                                                                                                          
                                                                                                                                                                                    question = os.environ.get("USER_QUESTION", "Who are you?")
                                                                                                                                                                                              print(f"You: {question}")
                                                                                                                                                                                              
                                                                                                                                                                                                        model_name = "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
                                                                                                                                                                                                                  print("Loading TinyLlama...")
                                                                                                                                                                                                                  
                                                                                                                                                                                                                            tokenizer = AutoTokenizer.from_pretrained(model_name, cache_dir="./model")
                                                                                                                                                                                                                                      model = AutoModelForCausalLM.from_pretrained(
                                                                                                                                                                                                                                                    model_name,
                                                                                                                                                                                                                                                                  cache_dir="./model",
                                                                                                                                                                                                                                                                                torch_dtype=torch.float32,
                                                                                                                                                                                                                                                                                          )
                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                    device = torch.device("cpu")
                                                                                                                                                                                                                                                                                                              model.to(device)
                                                                                                                                                                                                                                                                                                                        model.eval()
                                                                                                                                                                                                                                                                                                                                  print("TinyLlama loaded!")
                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                            messages = [
                                                                                                                                                                                                                                                                                                                                                          {"role": "system", "content": "You are a helpful, friendly AI assistant."},
                                                                                                                                                                                                                                                                                                                                                                        {"role": "user", "content": question}
                                                                                                                                                                                                                                                                                                                                                                                  ]
                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                            prompt = tokenizer.apply_chat_template(
                                                                                                                                                                                                                                                                                                                                                                                                          messages,
                                                                                                                                                                                                                                                                                                                                                                                                                        tokenize=False,
                                                                                                                                                                                                                                                                                                                                                                                                                                      add_generation_prompt=True
                                                                                                                                                                                                                                                                                                                                                                                                                                                )
                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                          encoded = tokenizer(prompt, return_tensors="pt").to(device)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    input_length = encoded["input_ids"].shape[1]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with torch.no_grad():
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            outputs = model.generate(
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              **encoded,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                max_new_tokens=200,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  temperature=0.7,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    top_p=0.9,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      do_sample=True,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        repetition_penalty=1.2,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          pad_token_id=tokenizer.eos_token_id,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  new_tokens = outputs[0][input_length:]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            response = tokenizer.decode(new_tokens, skip_special_tokens=True).strip()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      print(f"\nTinyLlama: {response}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                print("\n=== Done ===")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          PYEOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            USER_QUESTION: ${{ github.event.inputs.question }}
